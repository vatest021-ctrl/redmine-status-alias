en:
  project_module_status_alias: "Customer-facing status aliases"
  permission_view_status_aliases: "View customer-facing status aliases"
  label_status_alias_client_roles: "Customer roles"
  label_status_alias_internal_roles: "Internal roles without aliases"
  label_status_alias_mappings: "Status mappings"
  label_status_alias_internal_status: "Internal status"
  label_status_alias_customer_status: "Customer-facing status"
  label_status_alias_client_transitions: "Customer transitions"
  label_status_alias_current_status: "If current status is"
  label_status_alias_client_choice: "Customer chooses"
  label_status_alias_actual_target_status: "Actually set status"
  label_status_alias_no_transition_rule: "No rule"
  label_status_alias_no_alias: "No alias"
  label_status_alias_duplicate_aliases: "Duplicate customer-facing names"
  label_status_alias_missing_aliases: "Deleted alias statuses"
  label_status_alias_missing_transitions: "Deleted statuses in customer transitions"
  text_status_alias_client_roles_hint: "Only roles with the Redmine \"View customer-facing status aliases\" permission are available here. Users with the selected roles will see customer-facing issue status names only in projects where the plugin module is enabled. Administrators always see internal status names."
  text_status_alias_internal_roles_hint: "If a user has one of these roles in the project, internal status names are shown even when the user also has a customer role."
  text_status_alias_client_transitions_hint: "These rules are used only for duplicate customer-facing names in status change forms. If one customer-facing alias points to several internal statuses, the rule selects which real status is submitted to Redmine. The target status must still be allowed by the standard workflow."
  text_status_alias_no_ambiguous_transitions: "There are no duplicate customer-facing names, so separate transition rules are not required."
  text_status_alias_behavior_hint: "The plugin changes only the displayed status name in projects with the module enabled. Issue statuses, workflows, and Redmine history remain unchanged."
  text_status_alias_duplicate_aliases: "\"%{alias_name}\" is selected for several internal statuses: %{source_names}. This is valid in lists. For status change forms, set a rule in the \"Customer transitions\" section."
  text_status_alias_missing_aliases: "Settings reference statuses that no longer exist: %{status_ids}. Those rows will show the internal status until the settings are saved again."
  text_status_alias_missing_transitions: "Customer transition rules reference statuses that no longer exist: %{status_ids}. Those rules will not be applied until the settings are saved again."
