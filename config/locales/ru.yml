ru:
  project_module_status_alias: "Клиентские алиасы статусов"
  permission_view_status_aliases: "Видеть клиентские алиасы статусов"
  label_status_alias_client_roles: "Клиентские роли"
  label_status_alias_internal_roles: "Служебные роли без алиасов"
  label_status_alias_mappings: "Соответствие статусов"
  label_status_alias_internal_status: "Внутренний статус"
  label_status_alias_customer_status: "Статус для клиента"
  label_status_alias_no_alias: "Без замены"
  label_status_alias_duplicate_aliases: "Есть одинаковые клиентские названия"
  label_status_alias_missing_aliases: "Есть удаленные alias-статусы"
  text_status_alias_client_roles_hint: "Пользователи с выбранными ролями будут видеть клиентские названия статусов только в проектах, где включен модуль плагина. Администраторы всегда видят внутренние статусы."
  text_status_alias_internal_roles_hint: "Если у пользователя в проекте есть одна из этих ролей, внутренние статусы будут показаны без замены даже при наличии клиентской роли."
  text_status_alias_behavior_hint: "Плагин меняет только отображаемое название статуса в проектах с включенным модулем. Статусы задач, workflow и история Redmine остаются без изменений."
  text_status_alias_duplicate_aliases: "Статус \"%{alias_name}\" выбран для нескольких внутренних статусов: %{source_names}. В списках это допустимо, но в формах смены статуса клиент может увидеть одинаковые пункты."
  text_status_alias_missing_aliases: "В настройках сохранены ссылки на статусы, которых больше нет: %{status_ids}. Для таких строк будет показан внутренний статус, пока настройка не сохранена заново."
